<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yarrabilba Area — Fuel Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b1118;
    --surface:   #131c26;
    --surface2:  #1a2536;
    --border:    rgba(255,255,255,0.07);
    --text:      #e8edf2;
    --muted:     #6b7f94;
    --accent:    #00e676;
    --danger:    #ff4d4d;
    --warn:      #ffb300;
    --blue:      #2979ff;
    --fuel:      #f5a623;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(41,121,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,230,118,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 28px 20px 40px;
    max-width: 780px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }

  .brand { display: flex; align-items: center; gap: 12px; }

  .fuel-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--fuel), #e67e00);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(245,166,35,0.3);
  }

  .brand-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.5px; color: var(--text); line-height: 1.1;
  }

  .brand-text p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .refresh-ring-wrap {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px; flex-shrink: 0;
  }

  .ring-container {
    position: relative; width: 48px; height: 48px; cursor: pointer;
  }

  .ring-container svg { transform: rotate(-90deg); width: 48px; height: 48px; }
  .ring-container svg circle { fill: none; stroke-width: 3; cx: 24; cy: 24; r: 20; }
  circle.track-bg { stroke: var(--surface2); }
  circle.track-progress {
    stroke: var(--blue); stroke-linecap: round;
    stroke-dasharray: 125.6; stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }

  .ring-inner {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 600; color: var(--blue);
  }

  .refresh-label { font-size: 10px; color: var(--muted); text-align: center; }

  /* ── Fuel type selector ── */
  .fuel-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }


  .fuel-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .fuel-btn {
    flex: 1;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 1px;
    padding: 14px 10px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .fuel-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: var(--text);
    transform: translateY(-1px);
  }

  .fuel-btn.active {
    color: #fff;
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }

  .fuel-btn.active.u91    { background: #2979ff; border-color: #2979ff; }
  .fuel-btn.active.u95    { background: #00b74a; border-color: #00b74a; }
  .fuel-btn.active.u98    { background: #9c27b0; border-color: #9c27b0; }
  .fuel-btn.active.diesel { background: #f5a623; border-color: #f5a623; color: #000; }

  .summary {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    position: relative; overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card::after {
    content: ''; position: absolute;
    bottom: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card.cheapest::after  { background: var(--accent); }
  .stat-card.expensive::after { background: var(--danger); }
  .stat-card.average::after   { background: var(--blue); }

  .stat-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; color: var(--muted);
    margin-bottom: 6px; font-weight: 500;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 700; line-height: 1;
  }
  .stat-card.cheapest .stat-value  { color: var(--accent); }
  .stat-card.expensive .stat-value { color: var(--danger); }
  .stat-card.average .stat-value   { color: var(--blue); }

  .stat-unit { font-size: 12px; font-weight: 400; opacity: 0.7; margin-left: 2px; }
  .stat-sub  { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sort-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sort-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 500; margin-right: 4px; }

  .sort-btn {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'Barlow', sans-serif; font-size: 12px;
    font-weight: 500; padding: 6px 14px; cursor: pointer; transition: all 0.2s;
  }
  .sort-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .sort-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted);
    margin-bottom: 10px; margin-top: 4px;
  }

  .station-group { margin-bottom: 18px; }
  .stations { display: flex; flex-direction: column; gap: 6px; }

  .station-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px;
    display: flex; align-items: center; gap: 12px;
    animation: fadeUp 0.4s ease both;
    transition: border-color 0.2s, background 0.2s;
    position: relative; overflow: hidden;
  }

  .station-row:hover { border-color: rgba(255,255,255,0.15); background: var(--surface2); }
  .station-row.no-price { opacity: 0.4; }

  .station-row.cheapest { border-color: rgba(0,230,118,0.2); }
  .station-row.cheapest::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent); border-radius: 10px 0 0 10px;
  }

  .station-row.priciest { border-color: rgba(255,77,77,0.2); }
  .station-row.priciest::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--danger); border-radius: 10px 0 0 10px;
  }

  .rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 700; color: var(--muted);
    width: 20px; text-align: center; flex-shrink: 0;
  }

  .station-info { flex: 1; min-width: 0; }

  .station-name {
    font-weight: 600; font-size: 14px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center;
  }

  .logo-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.8px;
    padding: 2px 6px; border-radius: 4px;
    margin-right: 6px; flex-shrink: 0;
  }
  .logo-ampol   { background: rgba(255,59,48,0.15);   color: #ff3b30; border: 1px solid rgba(255,59,48,0.25); }
  .logo-bp      { background: rgba(0,183,74,0.15);    color: #00b74a; border: 1px solid rgba(0,183,74,0.25); }
  .logo-shell   { background: rgba(255,179,0,0.15);   color: #ffb300; border: 1px solid rgba(255,179,0,0.25); }
  .logo-7eleven { background: rgba(138,201,38,0.15); color: #8ac926; border: 1px solid rgba(138,201,38,0.25); }
  .logo-united  { background: rgba(41,121,255,0.15);  color: #2979ff; border: 1px solid rgba(41,121,255,0.25); }
  .logo-default { background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid rgba(255,255,255,0.12); }

  .bar-wrap {
    flex: 1; height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden; max-width: 100px;
  }
  .bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }

  .badge {
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; padding: 3px 7px; border-radius: 20px; flex-shrink: 0;
  }
  .badge-best  { background: rgba(0,230,118,0.15); color: var(--accent); }
  .badge-worst { background: rgba(255,77,77,0.15);  color: var(--danger); }

  footer {
    margin-top: 28px; display: flex; align-items: center;
    justify-content: space-between; flex-wrap: wrap; gap: 8px;
  }

  .last-updated { font-size: 11px; color: var(--muted); }
  .last-updated span { color: var(--text); font-weight: 500; }

  .refresh-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: 'Barlow', sans-serif; font-size: 12px;
    padding: 6px 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .refresh-btn.spinning .icon { animation: spin 0.6s linear; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading {
    display: flex; align-items: center; justify-content: center;
    min-height: 200px; color: var(--muted); font-size: 14px; gap: 10px;
  }

  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border); border-top-color: var(--blue);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }

  @media (max-width: 500px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .bar-wrap { display: none; }
    .fuel-btn { padding: 7px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="fuel-icon">⛽</div>
      <div class="brand-text">
        <h1>YARRABILBA AREA</h1>
        <p>Live Fuel Prices — Local Stations</p>
      </div>
    </div>
    <div class="refresh-ring-wrap">
      <div class="ring-container" onclick="manualRefresh()" title="Click to refresh now">
        <svg viewBox="0 0 48 48">
          <circle class="track-bg" />
          <circle class="track-progress" id="progressRing" />
        </svg>
        <div class="ring-inner" id="ringCountdown">—</div>
      </div>
      <div class="refresh-label">next<br>refresh</div>
    </div>
  </header>

  <!-- Fuel type selector -->
  <div class="fuel-selector">
    <button class="fuel-btn u91 active" data-fuel="91"    onclick="setFuel('91')">⛽ U91</button>
    <button class="fuel-btn u95"        data-fuel="95"    onclick="setFuel('95')">⛽ U95</button>
    <button class="fuel-btn u98"        data-fuel="98"    onclick="setFuel('98')">⛽ U98</button>
    <button class="fuel-btn diesel"     data-fuel="diesel" onclick="setFuel('diesel')">⛽ Diesel</button>
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div> Loading prices…</div>
  </div>
  <div id="summaryCards" class="summary" style="display:none"></div>
  <div class="sort-bar" id="sortBar" style="display:none">
    <span class="sort-label">Sort by</span>
    <button class="sort-btn active" data-sort="price" onclick="setSort('price')">Cheapest First</button>
    <button class="sort-btn" data-sort="supplier" onclick="setSort('supplier')">By Brand</button>
  </div>
  <div id="stationList"></div>


  <footer>
    <div class="last-updated">Last updated: <span id="lastUpdated">—</span></div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
      <span class="icon">↻</span> Refresh now
    </button>
  </footer>

</div>

<script>
  const REFRESH_INTERVAL_MS = 15 * 60 * 1000;
  const CIRCUMFERENCE = 2 * Math.PI * 20;

  let countdownInterval, nextRefreshAt;
  let currentSort = 'price';
  let currentFuel = '91';
  let cachedData  = null;

  async function fetchPrices() {
    const resp = await fetch(`prices.json?t=${Date.now()}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  function setFuel(fuel) {
    currentFuel = fuel;
    document.querySelectorAll('.fuel-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.fuel === fuel);
    });
    if (cachedData) renderAll(cachedData);
  }

  function setSort(mode) {
    currentSort = mode;
    document.querySelectorAll('.sort-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.sort === mode);
    });
    if (cachedData) renderAll(cachedData);
  }

  function getBrandInfo(name) {
    const n = name.toLowerCase();
    if (n.includes('ampol'))   return { cls: 'logo-ampol',   label: 'Ampol' };
    if (n.includes('bp'))      return { cls: 'logo-bp',      label: 'BP' };
    if (n.includes('shell'))   return { cls: 'logo-shell',   label: 'Shell' };
    if (n.includes('7-eleven') || n.includes('7eleven')) return { cls: 'logo-7eleven', label: '7-Eleven' };
    if (n.includes('united'))  return { cls: 'logo-united',  label: 'United' };
    return { cls: 'logo-default', label: 'Other' };
  }

  function getShortName(name) {
    return name
      .replace('7-Eleven ', '')
      .replace('Ampol ', '')
      .replace('BP ', '')
      .replace('Shell ', '')
      .replace('United ', '');
  }

  function stationHTML(s, rank, minP, maxP, prices) {
    const price      = s.fuels[currentFuel];
    const hasPrice   = price != null;
    const isCheapest = hasPrice && price === minP;
    const isPriciest = hasPrice && price === maxP;
    const barPct     = hasPrice && prices.length > 1
      ? Math.round(((price - minP) / (maxP - minP || 1)) * 100)
      : 0;
    const barColor   = isCheapest ? 'var(--accent)' : isPriciest ? 'var(--danger)' : 'var(--blue)';
    const priceColor = isCheapest ? 'var(--accent)' : isPriciest ? 'var(--danger)' : 'var(--text)';
    const badge      = isCheapest
      ? '<span class="badge badge-best">Cheapest</span>'
      : isPriciest
      ? '<span class="badge badge-worst">Highest</span>'
      : '';
    const cls    = !hasPrice ? ' no-price' : isCheapest ? ' cheapest' : isPriciest ? ' priciest' : '';
    const brand  = getBrandInfo(s.name);
    const short  = getShortName(s.name);

    return `
    <div class="station-row${cls}">
      <div class="rank">${hasPrice ? rank : '—'}</div>
      <div class="station-info">
        <div class="station-name">
          <span class="logo-badge ${brand.cls}">${brand.label}</span>${short}
        </div>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" style="width:${barPct}%; background:${barColor}"></div>
      </div>
      ${badge}
      <div style="text-align:right; flex-shrink:0;">
        <div style="font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:700; color:${hasPrice ? priceColor : 'var(--muted)'};">
          ${hasPrice ? price.toFixed(1) : '—'}<span style="font-size:11px; font-weight:400; opacity:0.6;">c/L</span>
        </div>
        ${hasPrice && !isCheapest && minP != null ? `<div style="font-size:10px; color:var(--muted); margin-top:1px;">+${(price - minP).toFixed(1)}c/L dearer</div>` : ''}
      </div>
    </div>`;
  }

  function renderAll(data) {
    cachedData = data;
    document.getElementById('content').style.display = 'none';
          document.getElementById('summaryCards').style.display = 'grid';
          document.getElementById('sortBar').style.display = 'flex';


    // Build station list with current fuel prices
    const stations = data.stations.map(s => ({
      ...s,
      currentPrice: s.fuels[currentFuel]
    }));

    const withPrice    = stations.filter(s => s.currentPrice != null);
    const withoutPrice = stations.filter(s => s.currentPrice == null);
    const sorted       = [
      ...withPrice.sort((a, b) => a.currentPrice - b.currentPrice),
      ...withoutPrice
    ];

    const prices = withPrice.map(s => s.currentPrice);
    const minP   = prices.length ? Math.min(...prices) : null;
    const maxP   = prices.length ? Math.max(...prices) : null;
    const avgP   = prices.length ? prices.reduce((a, b) => a + b, 0) / prices.length : null;

    const cheapestStation  = sorted.find(s => s.currentPrice === minP);
    const expensiveStation = sorted.find(s => s.currentPrice === maxP);

    const fuelLabel = { '91': 'U91', '95': 'U95', '98': 'U98', 'diesel': 'Diesel' }[currentFuel];

    document.getElementById('summaryCards').innerHTML = `
      <div class="stat-card cheapest">
        <div class="stat-label">Cheapest ${fuelLabel}</div>
        <div class="stat-value">${minP != null ? minP.toFixed(1) : '—'}<span class="stat-unit">c/L</span></div>
        <div class="stat-sub">${cheapestStation?.name ?? '—'}</div>
      </div>
      <div class="stat-card expensive">
        <div class="stat-label">Most expensive</div>
        <div class="stat-value">${maxP != null ? maxP.toFixed(1) : '—'}<span class="stat-unit">c/L</span></div>
        <div class="stat-sub">${expensiveStation?.name ?? '—'}</div>
      </div>`;

    let stationsHTML = '';
    if (currentSort === 'price') {
      let rank = 1;
      stationsHTML = `
        <div class="station-group">
          <div class="section-label">Cheapest to most expensive</div>
          <div class="stations">
            ${sorted.map(s => stationHTML(s, s.currentPrice != null ? rank++ : '—', minP, maxP, prices)).join('')}
          </div>
        </div>`;
    } else {
      const brands = [...new Set(data.stations.map(s => getBrandInfo(s.name).label))].sort();
      let rank = 1;
      stationsHTML = brands.map(brand => {
        const group = sorted.filter(s => getBrandInfo(s.name).label === brand);
        if (!group.length) return '';
        return `
          <div class="station-group">
            <div class="section-label">${brand}</div>
            <div class="stations">
              ${group.map(s => stationHTML(s, s.currentPrice != null ? rank++ : '—', minP, maxP, prices)).join('')}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('stationList').innerHTML = stationsHTML;
    document.getElementById('lastUpdated').textContent = data.last_updated_str ?? '—';
  }

  async function loadData() {
    try {
      const data = await fetchPrices();
      cachedData = data;
      renderAll(data);
    } catch (err) {
      document.getElementById('content').innerHTML = `
        <div class="loading" style="color:var(--danger)">
          ⚠ Could not load prices.json — run the workflow first.
        </div>`;
    }
  }

  function startCountdown() {
    clearInterval(countdownInterval);
    nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;
    countdownInterval = setInterval(() => {
      const remaining = Math.max(0, nextRefreshAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      const progress = remaining / REFRESH_INTERVAL_MS;
      const offset   = CIRCUMFERENCE * (1 - progress);
      document.getElementById('progressRing').style.strokeDashoffset = offset;
      document.getElementById('ringCountdown').textContent =
        remaining > 60000 ? `${mins}m` : `${secs}s`;
      if (remaining <= 0) { loadData(); startCountdown(); }
    }, 1000);
  }

  function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 600);
    loadData();
    startCountdown();
  }

  loadData();
  startCountdown();
</script>
</body>
</html>
